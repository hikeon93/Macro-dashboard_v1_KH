name: credit-valve-data

permissions:
  contents: write

on:
  schedule:
    - cron: "20 22 * * 0-4"   # UTC 22:20 = 한국시간 아침 7:20 (월~금)
  workflow_dispatch:            # Actions 탭에서 수동 실행 버튼 활성화

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FRED 스프레드 데이터 수집 (공식 API)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "::error::FRED_API_KEY 시크릿이 설정되지 않았습니다. Settings > Secrets and variables > Actions에서 추가하세요."
            exit 1
          fi
          mkdir -p data
          START=$(date -d "420 days ago" +%Y-%m-%d)
          curl -sf --retry 3 --retry-delay 15 \
            "https://api.stlouisfed.org/fred/series/observations?series_id=BAMLC0A0CM&api_key=${FRED_API_KEY}&file_type=json&observation_start=$START" \
            -o /tmp/ig.json
          curl -sf --retry 3 --retry-delay 15 \
            "https://api.stlouisfed.org/fred/series/observations?series_id=BAMLH0A0HYM2&api_key=${FRED_API_KEY}&file_type=json&observation_start=$START" \
            -o /tmp/hy.json
          python3 << 'EOF'
          import json, datetime

          def parse(path):
              obs = json.load(open(path))["observations"]
              return [{"d": o["date"], "v": float(o["value"])}
                      for o in obs if o["value"] not in (".", "")]

          out = {
              "updated": datetime.datetime.now(datetime.UTC).isoformat(),
              "IG_OAS": parse("/tmp/ig.json"),
              "HY_OAS": parse("/tmp/hy.json"),
          }
          json.dump(out, open("data/oas.json", "w"))
          print("IG:", len(out["IG_OAS"]), "HY:", len(out["HY_OAS"]))
          EOF

      - name: 변경분 커밋
        run: |
          git config user.name "credit-valve-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/oas.json
          git diff --cached --quiet || git commit -m "스프레드 데이터 자동 갱신"
          git push
