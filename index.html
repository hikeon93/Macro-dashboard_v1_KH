<style>

      { label:"FINRA 채권 데이터 — 오라클 회사채 수익률", url:"https://www.finra.org/finra-data/fixed-income", tip:"CDS 대신 오라클 개별 채권의 국채 대비 스프레드 직접 확인" },
      { label:"Google Alerts — 'Oracle CDS' 키워드 등록", url:"https://www.google.com/alerts", tip:"급등 시 언론이 즉시 보도하므로 알림이 실질적 최선" },
    ],
  },
];

const THRESHOLDS = [
  { name:"① 신규 데이터센터 ABS 발행 (CreditFlow 수동)", ok:"국채+150~200bp", warn:"+200~250bp", alert:"+250bp 이상 또는 딜 철회" },
  { name:"② 사모신용 환매 (뉴스·공시 수동)", ok:"환매요청 분기 5% 캡 이내", warn:"캡 초과 요청 지속", alert:"환매 중단·자산 헐값 매각 확산" },
  { name:"③ IG 스프레드 (자동)", ok:"90bp 이하", warn:"90~130bp", alert:"130bp 초과", key:"IG_OAS", lo:90, hi:130 },
  { name:"③ HY 스프레드 (자동)", ok:"350bp 이하", warn:"350~500bp", alert:"500bp 초과", key:"HY_OAS", lo:350, hi:500 },
  { name:"④ 오라클 5Y CDS (뉴스로 확인)", ok:"150bp 이하", warn:"150~250bp ← 현재 ~198bp", alert:"250bp 돌파" },
];

const TF = [
  { id:"1mo", label:"1개월", range:"1mo", interval:"1d", days:31 },
  { id:"6mo", label:"6개월", range:"6mo", interval:"1d", days:185 },
  { id:"1y", label:"1년", range:"1y", interval:"1wk", days:370 },
];

// ───────── 상태 ─────────
let quotes = {};
let fredData = {};      // { IG_OAS:[{d,v}], HY_OAS:[{d,v}] } — bp 단위 변환 후
let fredSource = null;  // "repo" | "proxy" | null
let openKey = null;
let tfByKey = {};
let guideOpen = true;
let loadedOnce = false;
const chartCache = {};
let refreshing = false;

// ───────── 데이터 페치 ─────────
async function fetchWithFallback(url, asText) {
  const candidates = [
    url,
    "https://corsproxy.io/?url=" + encodeURIComponent(url),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
  ];
  for (const u of candidates) {
    try {
      const r = await fetch(u);
      if (!r.ok) continue;
      return asText ? await r.text() : await r.json();
    } catch (e) { /* 다음 후보 */ }
  }
  throw new Error("모든 소스 실패");
}

async function fetchYahoo(sym, range, interval) {
  const url = "https://query1.finance.yahoo.com/v8/finance/chart/" +
    encodeURIComponent(sym) + "?interval=" + interval + "&range=" + range;
  const j = await fetchWithFallback(url, false);
  const res = j.chart.result[0];
  const closes = (res.indicators.quote[0].close || []).filter(function (v) { return v != null; });
  return {
    price: res.meta.regularMarketPrice,
    prev: (res.meta.chartPreviousClose != null ? res.meta.chartPreviousClose : res.meta.previousClose),
    series: closes,
  };
}

// FRED: 1순위 = 저장소 안의 data/oas.json (GitHub Actions가 매일 갱신, CORS 없음)
//        2순위 = fredgraph.csv 프록시 경유 (백업)
async function loadFred() {
  try {
    const r = await fetch("data/oas.json", { cache: "no-store" });
    if (r.ok) {
      const j = await r.json();
      const out = {};
      for (const key of ["IG_OAS", "HY_OAS"]) {
        if (j[key] && j[key].length) {
          out[key] = j[key].map(function (row) { return { d: row.d, v: row.v * 100 }; });
        }
      }
      if (out.IG_OAS || out.HY_OAS) { fredData = out; fredSource = "repo"; return; }
    }
  } catch (e) { /* 파일 없음 → 프록시 백업 */ }

  const map = { IG_OAS: "BAMLC0A0CM", HY_OAS: "BAMLH0A0HYM2" };
  for (const key in map) {
    try {
      const start = new Date(Date.now() - 420 * 86400000).toISOString().slice(0, 10);
      const url = "https://fred.stlouisfed.org/graph/fredgraph.csv?id=" + map[key] + "&cosd=" + start;
      const txt = await fetchWithFallback(url, true);
      fredData[key] = txt.trim().split("\n").slice(1)
        .map(function (l) { return l.split(","); })
        .filter(function (c) { return c[1] && c[1] !== "."; })
        .map(function (c) { return { d: c[0], v: parseFloat(c[1]) * 100 }; });
      fredSource = "proxy";
    } catch (e) { /* 실패 시 해당 지표만 미표시 */ }
  }
}

// ───────── 유틸 ─────────
function fmt(v) {
  if (v == null || isNaN(v)) return "—";
  if (Math.abs(v) >= 1000) return v.toLocaleString("en-US", { maximumFractionDigits: 0 });
  return v.toLocaleString("en-US", { maximumFractionDigits: 2 });
}
function findTicker(k) {
  for (const s of SECTIONS) for (const t of s.tickers) if (t.k === k) return t;
  return null;
}
function lightColor(key, lo, hi) {
  const q = quotes[key];
  if (!q) return "var(--dim)";
  if (q.price > hi) return "var(--up)";
  if (q.price > lo) return "var(--warn)";
  return "var(--ok)";
}

// ───────── 렌더 ─────────
function renderThresholds() {
  let inner = '<div class="cardHead" onclick="toggleGuide()">' +
    '<span class="cardTitle">경보 임계값 신호등 (지표 ①~④)</span>' +
    '<span class="caret">' + (guideOpen ? "▲" : "▼") + "</span></div>";
  if (guideOpen) {
    for (const th of THRESHOLDS) {
      const c = th.key ? lightColor(th.key, th.lo, th.hi) : "var(--dim)";
      const val = th.key && quotes[th.key]
        ? '<span class="mono thVal" style="color:' + c + '">' + fmt(quotes[th.key].price) + "bp</span>" : "";
      inner += '<div class="thRow"><span class="dot" style="background:' + c + '"></span>' +
        '<div style="flex:1"><div class="thName">' + th.name + val + "</div>" +
        '<div class="thLevels"><span style="color:var(--ok)">정상 ' + th.ok + "</span> · " +
        '<span style="color:var(--warn)">경계 ' + th.warn + "</span> · " +
        '<span style="color:var(--up)">경보 ' + th.alert + "</span></div></div></div>";
    }
    inner += '<div class="guideNote">읽는 법: 4개 지표 중 <b>2개 이상이 경보</b>로 넘어가면 "부외화 밸브 폐쇄" 국면 진입으로 간주 — ' +
      "메모리 반도체 포지션(하이닉스·FORM·메모리 ETF·DRAM ETF)의 축소 검토를 시작할 것. 단일 지표의 하루 점등은 노이즈.</div>";
  }
  document.getElementById("thresholdCard").innerHTML = '<div class="card">' + inner + "</div>";
}

function ratioHTML() {
  const r = quotes.RATIO;
  if (!r) return "";
  const chg = ((r.price - r.prev) / r.prev) * 100;
  const cls = chg >= 0 ? UP_TXT : DN_TXT;
  const arrow = chg >= 0 ? "▲" : "▼";
  const hint = chg >= 0 ? "하이일드 우위 = 위험선호 유지"
    : "하이일드 열위 = 위험회피 조짐, 추세화되면 신디케이션 환경 악화 전조";
  return '<div class="ratioBox"><span class="ratioLabel">HYG / LQD 상대강도</span>' +
    '<span class="mono" style="font-weight:700;font-size:15px">' + r.price.toFixed(4) + "</span>" +
    '<span class="mono ' + cls + '" style="font-size:12.5px;font-weight:700">' + arrow + Math.abs(chg).toFixed(2) + "%</span>" +
    '<span class="ratioHint">' + hint + "</span></div>";
}

function rowHTML(t) {
  const q = quotes[t.k];
  let right;
  if (q) {
    const chg = q.prev ? ((q.price - q.prev) / Math.abs(q.prev)) * 100 : null;
    const cls = chg == null ? "" : (chg >= 0 ? UP_TXT : DN_TXT);
    const chgTxt = chg == null ? "" : (chg >= 0 ? "▲" : "▼") + Math.abs(chg).toFixed(2) + "%";
    right = '<span class="price mono">' + fmt(q.price) + (t.unit || "") + "</span>" +
      '<span class="chg mono ' + cls + '">' + chgTxt + "</span>";
  } else if (loadedOnce) {
    right = '<span class="failTxt">불러오기 실패 · 새로고침</span>';
  } else {
    right = '<span class="skeleton mono">로딩…</span>';
  }
  let html = '<div class="rowWrap"><div class="row" onclick="toggleRow(\'' + t.k + '\')">' +
    '<div style="flex:1;min-width:0"><span class="tk mono">' + t.k + '</span>' +
    '<span class="tname">' + t.name + "</span></div>" + right + "</div>";
  if (openKey === t.k) {
    const tf = tfByKey[t.k] || "1mo";
    let tfBtns = "";
    for (const x of TF) {
      tfBtns += '<button class="tfBtn' + (tf === x.id ? " on" : "") +
        '" onclick="setTf(\'' + t.k + "','" + x.id + '\')">' + x.label + "</button>";
    }
    html += '<div class="panel"><div class="tfRow">' + tfBtns + "</div>" +
      '<div id="chart-' + t.k + '"><div class="chartMsg">차트 불러오는 중…</div></div>' +
      '<div class="interp">' +
      '<div class="interpBlock" style="border-left:3px solid var(--up)"><b class="cUp">상승 시</b> ' + t.up + "</div>" +
      '<div class="interpBlock" style="border-left:3px solid var(--dn)"><b class="cDn">하락 시</b> ' + t.dn + "</div>" +
      '<div class="interpBlock" style="border-left:3px solid var(--dim)"><b style="color:var(--soft)">◎ 참고</b> ' + t.note + "</div>" +
      "</div></div>";
  }
  return html + "</div>";
}

function renderSections() {
  let html = "";
  for (const sec of SECTIONS) {
    html += '<div class="section"><div class="secHead"><span class="secTag mono">' + sec.tag +
      '</span><span class="secLabel">' + sec.label + "</span></div>" +
      '<div class="secDesc">' + sec.desc + "</div>";
    if (sec.ratio) html += ratioHTML();
    for (const t of sec.tickers) html += rowHTML(t);
    if (sec.links) {
      for (const l of sec.links) {
        html += '<a class="linkRow" href="' + l.url + '" target="_blank" rel="noreferrer">' +
          '<div class="linkLabel">' + l.label + ' ↗</div><div class="linkTip">' + l.tip + "</div></a>";
      }
    }
    html += "</div>";
  }
  document.getElementById("sections").innerHTML = html;
  if (openKey) loadChart(openKey);
}

function chartSVG(series, color) {
  if (!series || series.length < 2) return '<div class="chartMsg">데이터 없음</div>';
  const W = 560, H = 120, P = 6;
  const min = Math.min.apply(null, series), max = Math.max.apply(null, series);
  const span = (max - min) || 1;
  const pts = series.map(function (v, i) {
    const x = P + (i / (series.length - 1)) * (W - P * 2);
    const y = H - P - ((v - min) / span) * (H - P * 2);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  const first = series[0], last = series[series.length - 1];
  const ret = ((last - first) / Math.abs(first)) * 100;
  const retCls = ret >= 0 ? UP_TXT : DN_TXT;
  return '<div class="chartStats mono"><span class="' + retCls + '" style="font-weight:700">기간 ' +
    (ret >= 0 ? "+" : "") + ret.toFixed(2) + "%</span>" +
    '<span class="chartMinMax">고 ' + fmt(max) + " · 저 " + fmt(min) + "</span></div>" +
    '<svg viewBox="0 0 ' + W + " " + H + '" style="width:100%;height:auto;display:block">' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round"/></svg>';
}

async function loadChart(key) {
  const t = findTicker(key);
  const el = document.getElementById("chart-" + key);
  if (!t || !el) return;
  const tf = tfByKey[key] || "1mo";
  const conf = TF.find(function (x) { return x.id === tf; });
  const cacheKey = key + ":" + tf;
  const q = quotes[key];
  const chg = q && q.prev ? q.price - q.prev : 0;
  const color = chg >= 0 ? upColor() : dnColor();

  if (chartCache[cacheKey]) { el.innerHTML = chartSVG(chartCache[cacheKey], color); return; }
  try {
    let series;
    if (t.type === "yahoo") {
      const d = await fetchYahoo(t.y, conf.range, conf.interval);
      series = d.series;
    } else {
      const rows = fredData[key] || [];
      const cutoff = new Date(Date.now() - conf.days * 86400000).toISOString().slice(0, 10);
      series = rows.filter(function (r) { return r.d >= cutoff; }).map(function (r) { return r.v; });
      if (!series.length) throw new Error("no fred data");
    }
    chartCache[cacheKey] = series;
    const el2 = document.getElementById("chart-" + key);
    if (el2) el2.innerHTML = chartSVG(series, color);
  } catch (e) {
    const el3 = document.getElementById("chart-" + key);
    if (el3) el3.innerHTML = '<div class="chartMsg">차트를 불러오지 못했습니다. 새로고침 해보세요.</div>';
  }
}

// ───────── 이벤트 (전역) ─────────
window.toggleGuide = function () { guideOpen = !guideOpen; renderThresholds(); };
window.toggleRow = function (k) { openKey = (openKey === k ? null : k); renderSections(); };
window.setTf = function (k, tf) { tfByKey[k] = tf; renderSections(); };

// ───────── 테마 ─────────
function applyTheme(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  document.getElementById("metaTheme").setAttribute("content", mode === "light" ? "#F2F4F9" : "#0E1220");
  document.getElementById("themeBtn").textContent = mode === "light" ? "다크" : "라이트";
  try { localStorage.setItem("cv-theme", mode); } catch (e) {}
}
function initTheme() {
  let mode = null;
  try { mode = localStorage.getItem("cv-theme"); } catch (e) {}
  if (!mode) {
    mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
  }
  applyTheme(mode);
  document.getElementById("themeBtn").addEventListener("click", function () {
    applyTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
  });
}

// ───────── 시세 전체 갱신 ─────────
async function loadAll() {
  if (refreshing) return;
  refreshing = true;
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true; btn.textContent = "갱신 중…";

  const next = {};
  const jobs = [loadFred()];
  for (const sec of SECTIONS) {
    for (const t of sec.tickers) {
      if (t.type !== "yahoo") continue;
      jobs.push((async function (tt) {
        try {
          const d = await fetchYahoo(tt.y, "5d", "1d");
          next[tt.k] = { price: d.price, prev: d.prev };
        } catch (e) { /* 개별 실패 무시 */ }
      })(t));
    }
  }
  await Promise.all(jobs);

  // FRED → 시세행
  for (const key of ["IG_OAS", "HY_OAS"]) {
    const rows = fredData[key];
    if (rows && rows.length >= 2) {
      next[key] = { price: rows[rows.length - 1].v, prev: rows[rows.length - 2].v };
    }
  }
  if (next.HYG && next.LQD) {
    next.RATIO = { price: next.HYG.price / next.LQD.price, prev: next.HYG.prev / next.LQD.prev };
  }
  for (const k in next) quotes[k] = next[k];
  loadedOnce = true;

  const now = new Date();
  const srcTxt = fredSource === "repo" ? "스프레드: 저장소 자동갱신" :
    fredSource === "proxy" ? "스프레드: 우회 서버" : "스프레드: 미수신";
  document.getElementById("updated").className = "mono";
  document.getElementById("updated").textContent =
    "마지막 갱신: " + now.toLocaleString("ko-KR") + " · 야후 약 15분 지연 · " + srcTxt;
  try {
    localStorage.setItem("credit-valve-cache", JSON.stringify({ q: quotes, u: now.toISOString() }));
  } catch (e) {}

  renderThresholds(); renderSections();
  btn.disabled = false; btn.textContent = "새로고침";
  refreshing = false;
}

// ───────── 초기화 ─────────
(function init() {
  initTheme();
  try {
    const c = localStorage.getItem("credit-valve-cache");
    if (c) {
      const p = JSON.parse(c);
      quotes = p.q || {};
      document.getElementById("updated").className = "mono";
      document.getElementById("updated").textContent =
        "마지막 갱신: " + new Date(p.u).toLocaleString("ko-KR") + " (캐시)";
    }
  } catch (e) {}
  renderThresholds(); renderSections();
  document.getElementById("refreshBtn").addEventListener("click", loadAll);
  loadAll();
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  }
})();
</script>
